<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AR Solutions</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
    <div class="ambient-bg"></div>

    <div style="width: 100%; max-width: 500px;">
        <div class="glass-card" data-aos="zoom-in">
            <div style="text-align: center; margin-bottom: 30px;">
                <a href="index.html" class="logo" style="display: inline-block; margin-bottom: 20px;">
                    <img src="https://hariniselvan-bot.github.io/biotech/logo.webp" alt="AR Solutions Logo">
                </a>
                <h2>Create <span class="text-gradient">Account</span></h2>
                <p style="color: var(--text-muted); font-size: 14px;">Begin your enterprise digital transformation.</p>
            </div>

            <form id="signupForm" action="login.html">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">First Name</label>
                        <input type="text" class="form-control" required placeholder="Jane">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">Last Name</label>
                        <input type="text" class="form-control" required placeholder="Doe">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">Work Email</label>
                    <input type="email" class="form-control" required placeholder="jane@company.com">
                </div>

                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">Password</label>
                    <input type="password" class="form-control" required placeholder="••••••••">
                </div>

                <div style="margin-bottom: 20px; font-size: 12px; color: var(--text-muted);">
                    <label style="display: flex; align-items: flex-start; gap: 8px; cursor: pointer; line-height: 1.4;">
                        <input type="checkbox" required style="margin-top: 2px;"> I agree to the Terms of Service and Privacy Policy for enterprise usage.
                    </label>
                </div>

                <button type="submit" class="btn btn-glow" style="width: 100%;">Create Account</button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 14px;">
                <p style="color: var(--text-muted);">Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Log In</a></p>
                <a href="index.html" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; margin-top: 25px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 14px; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff'; this.style.borderColor='rgba(255,255,255,0.2)';" onmouseout="this.style.background='rgba(255,255,255,0.03)'; this.style.color='var(--text-muted)'; this.style.borderColor='rgba(255,255,255,0.1)';">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Return to Homepage
                </a>
            </div>
            <div style="text-align: center; margin-top: 40px; padding-bottom: 20px; color: var(--text-muted); font-size: 12px;">
                &copy; 2026 Stackly. All Rights Reserved.
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
