<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AR Solutions</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
    <div class="ambient-bg"></div>

    <div style="width: 100%; max-width: 500px;">
        <div class="glass-card" data-aos="zoom-in">
            <div style="text-align: center; margin-bottom: 30px;">
                <a href="index.html" class="logo" style="display: inline-block; margin-bottom: 20px;">
                    <img src="assets/logo.webp" alt="AR Solutions Logo">
                </a>
                <h2>Access <span class="text-gradient">Portal</span></h2>
                <p style="color: var(--text-muted); font-size: 14px;">Enter your credentials to continue.</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="name@company.com">
                </div>

                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">Password</label>
                    <input type="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">Login As</label>
                    <select id="roleSelect" class="form-control" style="appearance: none; -webkit-appearance: none;">
                        <option value="client">Client (Tenant)</option>
                        <option value="admin">System Administrator</option>
                    </select>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; color: var(--text-muted);">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="404.html" style="color: var(--primary); text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-glow" style="width: 100%;">Login to Dashboard</button>
            </form>

            <script>
                function handleLogin(e) {
                    e.preventDefault();
                    const email = document.getElementById('loginEmail').value;
                    if(email) localStorage.setItem('userEmail', email);
                    const role = document.getElementById('roleSelect').value;
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'client-dashboard.html';
                    }
                }
            </script>

            <div style="text-align: center; margin-top: 20px; font-size: 14px;">
                <p style="color: var(--text-muted);">Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign Up</a></p>
                <a href="index.html" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; margin-top: 25px; background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 14px; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(0,0,0,0.08)'; this.style.color='var(--text-main)'; this.style.borderColor='rgba(0,0,0,0.2)';" onmouseout="this.style.background='rgba(0,0,0,0.03)'; this.style.color='var(--text-muted)'; this.style.borderColor='rgba(0,0,0,0.1)';">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Return to Homepage
                </a>
            </div>
            <div style="text-align: center; margin-top: 40px; padding-bottom: 20px; color: var(--text-muted); font-size: 12px;">
                &copy; 2026 Stackly. All Rights Reserved.
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
