<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | AR Solutions</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
    <div class="ambient-bg"></div>

    <div style="text-align: center;" data-aos="zoom-in">
        <h1 style="font-size: clamp(80px, 15vw, 150px); line-height: 1; margin-bottom: 20px;" class="text-gradient">404</h1>
        <h2 style="font-size: clamp(24px, 5vw, 40px); margin-bottom: 20px;">Reality Not Found</h2>
        <p style="color: var(--text-muted); font-size: 18px; margin-bottom: 40px;">The hologram you are looking for has been disconnected or doesn't exist.</p>
        
        <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <button onclick="history.back()" class="btn btn-outline" style="padding: 15px 30px; font-size: 16px;">
                <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Go Back
            </button>
            <a href="index.html" class="btn btn-glow" style="padding: 15px 30px; font-size: 16px;">
                <i class="fa-solid fa-house" style="margin-right: 8px;"></i> Return to Home
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
